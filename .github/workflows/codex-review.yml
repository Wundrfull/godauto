name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  codex-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        id: tests
        run: |
          python -m pytest tests/unit/ -q --tb=short 2>&1 | tee test-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Run linter
        id: lint
        run: |
          ruff check src/auto_godot/ 2>&1 | tee lint-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Run type checker
        id: typecheck
        run: |
          mypy src/auto_godot/ --ignore-missing-imports 2>&1 | tee mypy-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Codex Review
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          model: o3
          direct_prompt: |
            You are the Codex Reviewer bot for auto-godot, a Python CLI tool for the
            Godot game engine. Review this PR with a focus on:

            1. **Bug detection**: Logic errors, off-by-one, missing edge cases.
            2. **Python quality**: Proper type hints, clean error handling, no bare excepts.
            3. **Parser correctness**: If .tscn/.tres parsing/generation is changed, verify
               round-trip fidelity and format=3 compatibility.
            4. **Dependency safety**: Flag any new dependencies or version changes.
            5. **Test results**: Tests exited with code ${{ steps.tests.outputs.exit_code }},
               lint exited with ${{ steps.lint.outputs.exit_code }},
               mypy exited with ${{ steps.typecheck.outputs.exit_code }}.
               If any failed, note this in your review.

            Review guidelines:
            - Be concise. Focus on correctness over style.
            - Classify findings as BLOCKER, WARNING, or NOTE.
            - If the PR is clean and tests pass, approve with a brief summary.
            - If there are BLOCKERs, request changes with specific fix suggestions.

      - name: Post test results as comment
        if: steps.tests.outputs.exit_code != '0' || steps.lint.outputs.exit_code != '0' || steps.typecheck.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## CI Status Report\n\n';

            const testExit = '${{ steps.tests.outputs.exit_code }}';
            const lintExit = '${{ steps.lint.outputs.exit_code }}';
            const mypyExit = '${{ steps.typecheck.outputs.exit_code }}';

            body += `| Check | Status |\n|-------|--------|\n`;
            body += `| Tests | ${testExit === '0' ? 'PASS' : 'FAIL'} |\n`;
            body += `| Lint | ${lintExit === '0' ? 'PASS' : 'FAIL'} |\n`;
            body += `| Type check | ${mypyExit === '0' ? 'PASS' : 'FAIL'} |\n\n`;

            if (testExit !== '0') {
              const out = fs.readFileSync('test-output.txt', 'utf8').slice(-1500);
              body += '### Test Output\n```\n' + out + '\n```\n\n';
            }
            if (lintExit !== '0') {
              const out = fs.readFileSync('lint-output.txt', 'utf8').slice(-1500);
              body += '### Lint Output\n```\n' + out + '\n```\n\n';
            }
            if (mypyExit !== '0') {
              const out = fs.readFileSync('mypy-output.txt', 'utf8').slice(-1500);
              body += '### Type Check Output\n```\n' + out + '\n```\n\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
