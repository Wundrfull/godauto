name: Claude Auto-Fix Issues

# Triggers:
# 1. New issue opened -> Claude investigates and creates a fix PR
# 2. @claude mentioned in issue comment -> Claude responds/acts
# 3. Issue labeled 'claude-fix' -> Claude picks it up
on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ---------------------------------------------------------------
  # Auto-fix: triggered when a new issue is opened
  # ---------------------------------------------------------------
  auto-fix:
    if: >
      github.event_name == 'issues' &&
      (
        github.event.action == 'opened' ||
        (github.event.action == 'labeled' && github.event.label.name == 'claude-fix')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdauto
        run: pip install -e .

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A new issue has been filed. Your job is to investigate it, understand the
            root cause by reading the codebase, implement a fix, run the tests, and
            create a PR.

            ## Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}

            ${{ github.event.issue.body }}

            ## Instructions

            1. Read the issue carefully. Understand what the user experienced and what
               the expected behavior should be.
            2. Search the codebase for the relevant code. The source is in src/gdauto/.
            3. Identify the root cause.
            4. Implement a minimal, focused fix. Do not refactor surrounding code.
            5. Run tests: `python -m pytest tests/unit/ -x -q`
            6. If tests pass, create a new branch, commit the fix, push, and open a PR
               that references the issue with "Fixes #${{ github.event.issue.number }}".
            7. If you cannot fix it (e.g., it requires design decisions, is a feature
               request needing discussion, or you are unsure), comment on the issue
               explaining what you found and label it 'needs-human'.

            Keep the fix small and focused. One issue, one fix, one PR.
          claude_args: "--model claude-sonnet-4-6 --max-turns 25 --max-budget-usd 5.00"

  # ---------------------------------------------------------------
  # Respond to @claude mentions in issue comments
  # ---------------------------------------------------------------
  respond:
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdauto
        run: pip install -e .

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 15 --max-budget-usd 3.00"
