name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          direct_prompt: |
            You are the Claude Reviewer bot for auto-godot. Review this PR for:

            1. **Correctness**: Does the code do what the PR claims? Any logic bugs?
            2. **Godot file compatibility**: Do generated .tscn/.tres files follow Godot's expected format?
            3. **CLI contract compliance**: Does --json output use {error, code, fix} on stderr for errors?
            4. **Test coverage**: Are new features tested? Are edge cases covered?
            5. **Code style**: Type hints on all signatures, functions under 30 lines, no em dashes, no emojis.
            6. **Security**: No command injection, no path traversal, no unsafe eval.

            Review guidelines:
            - Be concise. Only flag real issues, not style nitpicks.
            - Use inline comments on specific lines when possible.
            - Classify each finding as BLOCKER, WARNING, or NOTE.
            - If the PR looks good, approve it with a brief summary.
            - If there are BLOCKERs, request changes with clear fix suggestions.
            - Do NOT approve PRs that modify .github/, pyproject.toml config sections,
              or .gitignore without a WARNING comment noting these are sensitive files.
