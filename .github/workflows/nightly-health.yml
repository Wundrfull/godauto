name: Nightly Health Check

on:
  schedule:
    # Run every day at 6 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        id: tests
        run: |
          python -m pytest tests/unit/ -q --tb=short 2>&1 | tee test-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Run linter
        id: lint
        run: |
          ruff check src/gdauto/ 2>&1 | tee lint-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Create issue on failure
        if: steps.tests.outputs.exit_code != '0' || steps.lint.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testOutput = fs.readFileSync('test-output.txt', 'utf8').slice(-2000);
            const lintOutput = fs.readFileSync('lint-output.txt', 'utf8').slice(-2000);

            const testFailed = '${{ steps.tests.outputs.exit_code }}' !== '0';
            const lintFailed = '${{ steps.lint.outputs.exit_code }}' !== '0';

            let body = '## Nightly Health Check Failed\n\n';
            body += `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;

            if (testFailed) {
              body += '### Test Failures\n```\n' + testOutput + '\n```\n\n';
            }
            if (lintFailed) {
              body += '### Lint Errors\n```\n' + lintOutput + '\n```\n\n';
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly] Health check failed (${new Date().toISOString().split('T')[0]})`,
              body: body,
              labels: ['bug', 'nightly']
            });
